<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <title>ClaudeMeter — Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <header>
      <h1>ClaudeMeter Options</h1>
    </header>

    <section class="card">
      <h2>Refresh</h2>
      <label class="row">
        <span>
          Refresh interval
          <small>How often the background worker fetches usage in the background.</small>
        </span>
        <span class="slider-value" id="refreshIntervalValue">5 min</span>
      </label>
      <input type="range" id="refreshIntervalSlider" min="1" max="30" step="1" />
    </section>

    <section class="card">
      <h2>Notifications</h2>
      <label class="row">
        <span>
          Notify at usage thresholds
          <small>Desktop notification when session or weekly usage crosses a threshold.</small>
        </span>
        <input type="checkbox" id="notificationsToggle" />
      </label>
      <div class="row" id="thresholdsRow">
        <span>Thresholds</span>
        <div class="threshold-checks">
          <label><input type="checkbox" class="threshold-check" value="80" /> 80%</label>
          <label><input type="checkbox" class="threshold-check" value="95" /> 95%</label>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Appearance</h2>
      <label class="row">
        <span>Theme</span>
        <select id="themeSelect">
          <option value="auto">Auto (match system)</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </label>
    </section>

    <section class="card">
      <h2>Developer / Debug</h2>
      <label class="row">
        <span>
          Developer mode
          <small>Keeps raw request/response captures for inspection on the debug page.</small>
        </span>
        <input type="checkbox" id="developerModeToggle" />
      </label>
      <a class="debug-link" href="../debug/debug.html">Open Debug Captures &rarr;</a>
    </section>

    <section class="card">
      <h2>Data</h2>
      <button id="clearDataBtn" class="danger">Clear stored data</button>
      <p class="hint">Removes all captured requests, usage history, and org lookup cache.</p>
    </section>

    <script type="module" src="options.js"></script>
  </body>
</html>
