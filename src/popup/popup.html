<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ClaudeMeter</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <span class="wordmark">ClaudeMeter</span>
      <span class="badge">Discovery mode</span>
    </header>

    <main>
      <p class="lead">
        This is a Phase 1 build. It's watching claude.ai network traffic for usage/limit
        endpoints, but doesn't render real usage numbers yet — that lands in Phase 2.
      </p>
      <p class="capture-count"><span id="captureCount">0</span> request(s) captured so far.</p>
      <button id="openClaudeBtn">Open claude.ai</button>
      <a class="debug-link" id="debugLink" href="#">View debug captures &rarr;</a>
    </main>

    <footer>
      <a href="#" id="optionsLink">Options</a>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
